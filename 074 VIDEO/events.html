<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evenst</title>
    <style>
        .child {
            background-color: yellow;
            border: 2px solid black;
            padding: 34px;
            margin: 34px;


        }

        .childContainer {
            /* background-color: black; */
            padding: 40px;
        }

        .container {
            background-color: red;
            padding: 50px;
        }
    </style>
</head>

<body>
    <div class="container">
        <section class="childContainer">
            <div class="child">child box</div>
        </section>
    </div>
    <script>
        document.querySelector(".child").addEventListener("click", (e) => {
            e.stopPropagation()
            alert("child 我 不 会 中文")

        })
        document.querySelector(".childContainer").addEventListener("click", (e) => {
            e.stopPropagation()
            alert("child container 你 在 干 吗")

        })
        document.querySelector(".container").addEventListener("click", () => {
            alert("container 真 的 吗")

        })
        function getRandomColor() {
            let value1 = Math.ceil( 0 + Math.random() *255 ) 
            let value2 = Math.ceil( 0 + Math.random() *255 )
            let value3 = Math.ceil( 0 + Math.random() *255 )
            return `rgb(${value1} , ${value2} , ${value3})`
        }
        setInterval(() => { // it changes continuously
            // clearInterval clear the interval and will not change the color
            document.querySelector(".childContainer").style.backgroundColor = getRandomColor();
        }, 1000)
        // setTimeout(() => { // it changes only one time
        // clearTimeout will clear the timeout before changing the color
        //     document.querySelector(".childContainer").style.backgroundColor = getRandomColor();
        // }, 1000)
    </script>
</body>

</html>
