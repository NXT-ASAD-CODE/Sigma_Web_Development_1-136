<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Id and classes in HTML</title>
</head>
<body>
    <!--Id is respresnted with # and it is unique id can be used to target a specific element -->
   <div id="asad">Hello, World!</div> 
    <!--Class is respresnted with . and it is not unique classes can be given to multiple elements -->
   <div class="asad">Hello, World!</div>
</body>
</html>
