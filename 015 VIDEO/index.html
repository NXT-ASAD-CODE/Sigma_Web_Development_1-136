<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INLINE , INTERNAL AND EXTERNAL CSS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        p {
            color: green;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>INLINE , INTERNAL AND EXTERNAL CSS</h1>
    <p style="color: blue; font-size: 16px;">This is a simple paragraph to demonstrate the use of CSS (INLINE).</p>
    <p>This is another paragraph to demonstrate the use of CSS (INTERNAL).</p>
    <p class="external-css">This is yet another paragraph to demonstrate the use of CSS (EXTERNAL).</p>
</body>
</html>
