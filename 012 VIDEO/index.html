<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDEOS AND AUDIOS IN HTML ASSIGNMENT</title>
</head>
<body>
    <!-- VIDEOS -->
    <video src="1.mp4" controls muted autoplay></video>
    <video src="2.mp4" controls muted autoplay></video>
    <video src="3.mp4" controls muted autoplay></video>
    <video src="4.mp4" controls muted autoplay></video>
    <video src="5.mp4" controls muted autoplay></video>
    <video src="6.mp4" controls muted autoplay></video>
    <!-- AUDIOS -->
    <audio src="1.mp3" controls muted autoplay></audio>
    <audio src="2.mp3" controls muted autoplay></audio>
    <audio src="3.mp3" controls muted autoplay></audio>
    <audio src="4.mp3" controls muted autoplay></audio>
    <audio src="5.mp3" controls muted autoplay></audio>
    <audio src="6.mp3" controls muted autoplay></audio>
</body>
</html>
